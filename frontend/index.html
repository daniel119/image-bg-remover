<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Background Remover</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

    header { background: #fff; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    header span { color: #6366f1; }

    .hero { text-align: center; padding: 60px 24px 40px; }
    .hero h2 { font-size: 36px; font-weight: 800; margin-bottom: 12px; }
    .hero p { color: #666; font-size: 16px; }

    .upload-area {
      max-width: 480px; margin: 32px auto;
      border: 2px dashed #c7c7c7; border-radius: 16px;
      padding: 48px 24px; text-align: center; cursor: pointer;
      background: #fff; transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover, .upload-area.drag-over { border-color: #6366f1; background: #f0f0ff; }
    .upload-area svg { width: 48px; height: 48px; color: #aaa; margin-bottom: 12px; }
    .upload-area p { color: #888; font-size: 14px; margin-top: 8px; }
    .upload-area input { display: none; }

    .btn {
      display: inline-block; padding: 12px 28px; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer; border: none;
      background: #6366f1; color: #fff; transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }

    .result { max-width: 900px; margin: 0 auto; padding: 0 24px 60px; display: none; }
    .result h3 { text-align: center; font-size: 20px; margin-bottom: 24px; }
    .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .compare-item { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .compare-item label { display: block; padding: 10px 16px; font-size: 13px; font-weight: 600; color: #666; border-bottom: 1px solid #f0f0f0; }
    .compare-item img { width: 100%; display: block; background: repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 0 0 / 20px 20px; }
    .download-wrap { text-align: center; margin-top: 24px; }

    .loading { text-align: center; padding: 40px; display: none; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { max-width: 480px; margin: 0 auto 24px; padding: 12px 16px; background: #fff0f0; border: 1px solid #fca5a5; border-radius: 8px; color: #dc2626; font-size: 14px; display: none; }

    footer { text-align: center; padding: 24px; color: #aaa; font-size: 13px; }

    @media (max-width: 600px) {
      .compare { grid-template-columns: 1fr; }
      .hero h2 { font-size: 26px; }
    }
  </style>
</head>
<body>

<header>
  <h1>BG<span>Remover</span></h1>
</header>

<div class="hero">
  <h2>一键去除图片背景</h2>
  <p>上传图片，秒速处理，免费下载透明底 PNG</p>
</div>

<div class="upload-area" id="uploadArea">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
  </svg>
  <button class="btn" onclick="document.getElementById('fileInput').click()">选择图片</button>
  <p>或拖拽图片到此处 · 支持 JPG / PNG / WebP · 最大 10MB</p>
  <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" />
</div>

<div class="error" id="errorBox"></div>
<div class="loading" id="loading"><div class="spinner"></div><p>正在处理，请稍候...</p></div>

<div class="result" id="result">
  <h3>处理结果</h3>
  <div class="compare">
    <div class="compare-item"><label>原图</label><img id="originalImg" /></div>
    <div class="compare-item"><label>去背景</label><img id="resultImg" /></div>
  </div>
  <div class="download-wrap">
    <a id="downloadBtn" class="btn" download="removed-bg.png">下载 PNG</a>
  </div>
</div>

<footer>Powered by <a href="https://www.remove.bg" target="_blank">remove.bg</a></footer>

<script>
  // ⚠️ 替换为你的 Cloudflare Worker URL
  const WORKER_URL = 'https://image-bg-remover-worker.<your-subdomain>.workers.dev/api/remove-bg';

  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const errorBox = document.getElementById('errorBox');

  // Drag & drop
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) processFile(fileInput.files[0]);
  });

  async function processFile(file) {
    // Validate
    if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
      showError('仅支持 JPG / PNG / WebP 格式');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showError('文件大小不能超过 10MB');
      return;
    }

    hideError();
    result.style.display = 'none';
    loading.style.display = 'block';

    // Show original preview
    const originalUrl = URL.createObjectURL(file);
    document.getElementById('originalImg').src = originalUrl;

    try {
      const formData = new FormData();
      formData.append('image_file', file);

      const res = await fetch(WORKER_URL, { method: 'POST', body: formData });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.errors?.[0]?.title || '处理失败，请重试');
      }

      const blob = await res.blob();
      const resultUrl = URL.createObjectURL(blob);
      document.getElementById('resultImg').src = resultUrl;
      document.getElementById('downloadBtn').href = resultUrl;

      loading.style.display = 'none';
      result.style.display = 'block';
    } catch (e) {
      loading.style.display = 'none';
      showError(e.message);
    }
  }

  function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
  function hideError() { errorBox.style.display = 'none'; }
</script>
</body>
</html>
